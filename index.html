<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<header>
    <h1>Mars Base Emergency Simulator</h1>
    <p>SOL <span id="sol">1</span></p>
</header>

<main>
    <section class="top-panel">
        <div class="card">
            <h2>СТАН КОЛОНІЇ</h2>
            <p>Час до бурі:</p>
            <h1 id="timer">24:00</h1>
        </div>

        <div class="card">
            <h2>РЕСУРСИ</h2>
            <p>Кисень: <span id="oxygen">100</span>%</p>
            <p>Енергія: <span id="power">100</span>%</p>
            <p>Їжа: <span id="food">100</span>%</p>
            <p>Мораль: <span id="morale">100</span>%</p>
        </div>
    </section>

    <section class="event-panel card">
        <h2>ПОДІЯ МІСІЇ</h2>
        <p id="event-text">Натисніть старт місії</p>

        <div class="buttons">
            <button id="choice1">Вибір 1</button>
            <button id="choice2">Вибір 2</button>
        </div>

        <button id="start-btn">Почати місію</button>
    </section>

    <section class="logs card">
        <h2>ЖУРНАЛ СИСТЕМИ</h2>
        <ul id="log-list"></ul>
    </section>
</main>

<script src="script.js"></script>

</body>
</html>
</body>
</html>
